<!DOCTYPE html>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eceff1; padding: 20px; }

        .question-block { margin-bottom: 20px; padding: 15px; border-radius: 8px; border: 1px solid #ddd; transition: 0.3s; }
        .question-text { font-size: 1.1em; font-weight: 600; margin-bottom: 10px; color: #34495e; }
        .options-list { list-style: none; padding: 0; }
        .option-item { margin: 8px 0; padding: 10px; border: 1px solid #eee; border-radius: 5px; cursor: pointer; display: flex; align-items: center; }
        .option-item:hover { background: #f8f9fa; }
        .option-item input { margin-right: 15px; transform: scale(1.2); }
        
        /* Цвета для проверки */
        .correct { background-color: #d4edda !important; border-color: #c3e6cb !important; color: #155724; position: relative; }
        .wrong { background-color: #f8d7da !important; border-color: #f5c6cb !important; color: #721c24; }
        .feedback { font-weight: bold; margin-top: 5px; display: none; }

        .controls { position: sticky; bottom: 20px; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); text-align: center; }
        button { background: #3498db; color: white; border: none; padding: 12px 30px; border-radius: 25px; font-size: 18px; cursor: pointer; }
        button:hover { background: #2980b9; }
        #finalResult { font-size: 24px; font-weight: bold; margin-top: 20px; display: none; color: #2c3e50; }
    </style>
</head>

const container = document.getElementById('quiz-container');

// Рендерим вопросы
questionsData.forEach((item, index) => {
    const qDiv = document.createElement('div');
    qDiv.className = 'question-block';
    qDiv.id = `q-block-${index}`;
    
    let optionsHtml = '';
    item.a.forEach((opt, optIdx) => {
        optionsHtml += `
            <div class="option-item" onclick="checkAnswer(${index}, ${optIdx})">
                <input type="radio" name="q${index}" id="q${index}_${optIdx}">
                <label>${opt}</label>
            </div>
        `;
    });

    qDiv.innerHTML = `
        <div class="question-text">${index + 1}. ${item.q}</div>
        <div class="options-list">${optionsHtml}</div>
        <div class="feedback" id="feedback-${index}"></div>
    `;
    container.appendChild(qDiv);
});

let userScore = 0;
let answeredCount = 0;
const answeredQuestions = new Set();

function checkAnswer(qIdx, selectedIdx) {
    if (answeredQuestions.has(qIdx)) return; // Нельзя отвечать дважды

    const correctIdx = questionsData[qIdx].c;
    const block = document.getElementById(`q-block-${qIdx}`);
    const options = block.querySelectorAll('.option-item');
    const feedback = document.getElementById(`feedback-${qIdx}`);
    
    answeredQuestions.add(qIdx);
    answeredCount++;

    if (selectedIdx === correctIdx) {
        options[selectedIdx].classList.add('correct');
        feedback.innerHTML = "✓ Правильно!";
        feedback.style.color = "#155724";
        userScore++;
    } else {
        options[selectedIdx].classList.add('wrong');
        options[correctIdx].classList.add('correct');
        feedback.innerHTML = `✗ Неправильно. Правильный ответ: ${questionsData[qIdx].a[correctIdx]}`;
        feedback.style.color = "#721c24";
    }
    feedback.style.display = "block";
}

function showTotalResult() {
    const resDiv = document.getElementById('finalResult');
    resDiv.style.display = "block";
    resDiv.innerHTML = `Итог: ${userScore} из ${questionsData.length} ( ${Math.round(userScore/questionsData.length*100)}% )`;
    window.scrollTo(0, document.body.scrollHeight);
}
</script>
